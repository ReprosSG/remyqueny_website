<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Responsive Layout</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #5bb8e8;
      padding: 20px;
      font-family: Arial, sans-serif;
    }

    .container {
      background-color: white;
      border-radius: 12px;
      padding: 16px;
      max-width: 900px;
      margin: 0 auto;
    }

    /* --- SECTION 1: Green banner --- */
    .section-green {
      background-color: #8dc63f;
      height: 120px;
      border-radius: 6px;
      margin-bottom: 12px;
    }

    /* --- SECTION 2: Teal blocks --- */
    .section-teal {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    .teal-block {
      background-color: #00b0c8;
      border-radius: 6px;
      height: 70px;
    }

    /* --- SECTION 3: Gray blocks --- */
    .section-gray {
      display: grid;
      gap: 8px;
    }

    .gray-block {
      background-color: #d0d4d8;
      border-radius: 6px;
      height: 60px;
    }

    /* ===== MOBILE: width < 480px ===== */
    /* Teal: 1 column (stacked rows) */
    /* Gray: 2 columns */
    @media (max-width: 479px) {
      .section-teal {
        grid-template-columns: 1fr;
      }
      .section-gray {
        grid-template-columns: 1fr 1fr;
      }
    }

    /* ===== DESKTOP: width >= 480px ===== */
    /* Teal: 3 columns */
    /* Gray: 4 columns */
    @media (min-width: 480px) {
      .section-teal {
        grid-template-columns: 1fr 1fr 1fr;
      }
      .section-gray {
        grid-template-columns: 1fr 1fr 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Green header -->
    <div class="section-green"></div>

    <!-- Teal blocks -->
    <div class="section-teal">
      <div class="teal-block"></div>
      <div class="teal-block"></div>
      <div class="teal-block"></div>
    </div>

    <!-- Gray blocks -->
    <div class="section-gray">
      <div class="gray-block"></div>
      <div class="gray-block"></div>
      <div class="gray-block"></div>
      <div class="gray-block"></div>
    </div>
  </div>
</body>
</html>
